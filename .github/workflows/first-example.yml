name: Just workflow

on: push

jobs:
    first_job:
        runs-on: ubuntu-latest
        
        steps:

        - name: Checkout
          uses: actions/checkout@v6

        - name: Welcome message
          run: |
            echo "Fist GitHubActions Job"
            ls -ltra
            cat README.md

        - name: Generate ASCII Artwork
          run: cowsay -f dragon "Run for cover, I am a dragon ...RAWR" >> dragon.txt
